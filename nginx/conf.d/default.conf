##############################################################################
# Upstream — 4 NestJS instances, least-connections algorithm.
# keepalive 64 reuses connections so NGINX doesn't re-handshake on every req.
# max_fails / fail_timeout automatically removes a dead instance for 30s.
##############################################################################
upstream codego_backend {
    least_conn;
    server api1:3000 max_fails=3 fail_timeout=30s;
    server api2:3000 max_fails=3 fail_timeout=30s;
    server api3:3000 max_fails=3 fail_timeout=30s;
    server api4:3000 max_fails=3 fail_timeout=30s;
    keepalive 64;
}

server {
    listen 80;
    server_name _;

    # Allow larger request bodies for code submissions
    client_max_body_size 10m;

    # Extend timeouts for long-running code execution requests
    proxy_read_timeout  60s;
    proxy_send_timeout  60s;
    proxy_connect_timeout 5s;

    ##########################################################################
    # API — proxy to NestJS cluster
    ##########################################################################
    location /api/ {
        proxy_pass         http://codego_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";        # required for upstream keepalive
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Return 502 immediately if all upstreams are down (no endless wait)
        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_tries 2;
    }

    ##########################################################################
    # SPA — serve React app; try_files fixes "site not found" on hard-refresh
    ##########################################################################
    location / {
        root       /usr/share/nginx/html;
        index      index.html;
        try_files  $uri $uri/ /index.html;

        # Aggressive caching for static assets (JS/CSS have content-hash names)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    ##########################################################################
    # Health check — NGINX itself (Docker healthcheck)
    ##########################################################################
    location /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
