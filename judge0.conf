# Judge0 CE Configuration
# Docs: https://github.com/judge0/judge0/blob/master/judge0.conf

################################################################################
# POSTGRES
################################################################################
POSTGRES_DB=judge0
POSTGRES_USER=judge0
POSTGRES_PASSWORD=judge0_password
POSTGRES_HOST=judge0-db
POSTGRES_PORT=5432

################################################################################
# REDIS
################################################################################
REDIS_URL=redis://judge0-redis:6379
REDIS_HOST=judge0-redis
REDIS_PORT=6379

################################################################################
# WORKERS
################################################################################
# Number of worker processes per worker container.
# Each worker handles one submission at a time.
# With 2 worker containers × 2 workers = 4 concurrent executions.
COUNT_OF_WORKERS=2

################################################################################
# SECURITY / LIMITS
################################################################################
# Allow all language IDs (don't restrict)
ALLOW_ENABLE_WAIT_RESULT=true
ENABLE_WAIT_RESULT=true

# Per-submission resource caps
CPU_TIME_LIMIT=5
MEMORY_LIMIT=262144
MAX_PROCESSES_AND_OR_THREADS=30
ENABLE_PER_PROCESS_AND_THREAD_TIME_LIMIT=false
ENABLE_PER_PROCESS_AND_THREAD_MEMORY_LIMIT=false

# Max queue depth before Judge0 returns 503
MAX_QUEUE_SIZE=200

################################################################################
# LOGGING
################################################################################
RAILS_LOG_TO_STDOUT=true
